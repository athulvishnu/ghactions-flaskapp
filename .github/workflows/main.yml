name: CI/CD Pipeline for Flask App on AKS
on:
  push:
    branches:
      - master
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
    
      - name: short sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flaskapp:${{ env.SHORT_SHA }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/flaskapp:${{ env.SHORT_SHA }}

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
        
      - name: Deploy to AKS
        run: |
            kubectl apply -f k8s/deployment.yml
            kubectl apply -f k8s/service.yml

            kubectl set image deployment/flask-app \
            flask-app=${{ secrets.DOCKER_USERNAME }}/flaskapp:${{ env.SHORT_SHA }}
            